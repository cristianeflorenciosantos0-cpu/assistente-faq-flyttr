<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assistente FAQ · FLYTTR</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F2F2F2;
      --surface: #ffffff;
      --border: #E2E2E2;
      --shadow: #1A1A1A;
      --mid: #7A7A7A;
      --light: #AFAFAF;
      --honey: #EAAA46;
      --green: #22C55E;
      --font: 'Inter', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); font-family: var(--font); color: var(--shadow); }

    .topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 8px;
      z-index: 100;
    }

    .nav-logo { display: flex; align-items: center; gap: 8px; margin-right: 12px; }
    .nav-logo svg { width: 20px; height: 20px; }

    .nav-brand {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--shadow);
    }

    .nav-divider { width: 1px; height: 18px; background: var(--border); margin: 0 8px; }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--mid);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .nav-pill:hover { background: var(--bg); color: var(--shadow); }
    .nav-pill.active { background: var(--shadow); color: #fff; }
    .nav-pill svg { width: 13px; height: 13px; }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: 100vh;
      padding-top: 52px;
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .sidebar-title { font-size: 12px; font-weight: 600; color: var(--shadow); }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--mid);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .new-chat-btn:hover { background: var(--bg); color: var(--shadow); }

    .search-box {
      width: 100%;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 12px;
      font-family: var(--font);
      color: var(--shadow);
      outline: none;
    }
    .search-box::placeholder { color: var(--light); }
    .search-box:focus { border-color: var(--honey); }

    .sidebar-section { padding: 12px 14px 6px; }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 6px;
    }

    .hint-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--mid);
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.4;
      margin-bottom: 1px;
    }
    .hint-item:hover { background: var(--bg); color: var(--shadow); }

    .hint-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--honey);
      flex-shrink: 0;
      margin-top: 5px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 14px;
      border-top: 1px solid var(--border);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--mid);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 3px rgba(34,197,94,0); }
    }

    .chat-area {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    #n8n-chat-wrap {
      flex: 1;
      overflow: hidden;
      height: 100%;
    }

    /* Force n8n chat colors */
    #n8n-chat-wrap .chat-header {
      background-color: #FFF8EC !important;
      border-bottom: 1px solid #F0D9A8 !important;
    }
    #n8n-chat-wrap .chat-header * {
      color: #9A7A3A !important;
      font-size: 11px !important;
      font-weight: 500 !important;
      letter-spacing: 0.3px !important;
    }
    #n8n-chat-wrap .chat-message-from-bot .chat-message-bubble {
      background-color: #EAAA46 !important;
      color: #1A1A1A !important;
    }
    #n8n-chat-wrap .chat-message-from-user .chat-message-bubble {
      background-color: #9A9A9A !important;
      color: #ffffff !important;
    }
    #n8n-chat-wrap .chat-input,
    #n8n-chat-wrap .chat-inputs {
      background-color: #ffffff !important;
      border-top: 1px solid #E2E2E2 !important;
    }
    #n8n-chat-wrap .chat-input textarea,
    #n8n-chat-wrap .chat-input input {
      background: #ffffff !important;
      color: #1A1A1A !important;
    }
    #n8n-chat-wrap .chat-input button,
    #n8n-chat-wrap button[type="submit"] {
      background-color: #9A9A9A !important;
      color: #ffffff !important;
    }
    #n8n-chat-wrap button[type="submit"]:hover {
      background-color: #EAAA46 !important;
      color: #1A1A1A !important;
    }
    #n8n-chat-wrap .chat-footer,
    #n8n-chat-wrap [class*="footer"],
    #n8n-chat-wrap [class*="powered"] {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="nav-logo">

    Assistente FAQ
  </a>
</nav>

    <div class="sidebar-footer">

  <main class="chat-area">

<script>
  function sendHint(el) {
    setTimeout(() => {
      const input = document.querySelector('#n8n-chat-wrap input[type="text"], #n8n-chat-wrap textarea');
      if (input) {
        const text = el.innerText.replace('•', '').trim();
        const setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
        setter.call(input, text);
        input.dispatchEvent(new Event('input', { bubbles: true }));
        input.focus();
      }
    }, 100);
  }
</script>
